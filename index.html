<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Operating System Visual Learning Platform - interactive OS and CPU learning experience"
    />
    <title>Operating System Visual Learning Platform</title>
    <script>
      // Immediately apply persisted theme or system preference to avoid flash
      (function () {
        try {
          var stored = localStorage.getItem('theme');
          if (stored === 'dark' || stored === 'light') {
            document.documentElement.classList.toggle('dark', stored === 'dark');
            return;
          }
          var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
          document.documentElement.classList.toggle('dark', prefersDark);
        } catch (e) {
          // ignore
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
